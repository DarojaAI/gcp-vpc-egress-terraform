name: Pre-Commit Checks

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.6

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit hooks
        run: |
          # Clear pre-commit cache to avoid git fetch errors
          rm -rf ~/.cache/pre-commit
          # Disable hook auto-update to prevent git fetch
          export PRE_COMMIT_DISABLE_UPDATE_HOOKS=true
          # Run with frozen lock file to avoid updates
          PRE_COMMIT_HOME=/tmp/pre-commit-cache pre-commit run --all-files --show-diff-on-failure

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.6

      - name: Initialize Terraform
        working-directory: terraform
        run: terraform init -backend=false

      - name: Format check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Validate
        working-directory: terraform
        run: terraform validate
